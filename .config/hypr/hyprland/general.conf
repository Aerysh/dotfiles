
decoration {
  rounding=8

  blur {
    enabled=true
    size=8
    passes=4
    new_optimizations=true
    ignore_opacity = true
    noise=0.1
    contrast=1
    brightness=1
    xray=true
    vibrancy=0.5
    vibrancy_darkness=0.1
    popups=true
    popups_ignorealpha=0.2
  }

  fullscreen_opacity=1
  drop_shadow=true
  shadow_ignore_window=true
  shadow_range=50 
  shadow_offset=0 8 
  shadow_render_power=4
  col.shadow = rgba(00000055)
}

general {
  gaps_in=4
  gaps_out=4 
  border_size=1

  col.active_border = rgba(be95ffff)
  col.inactive_border = rgba(262626ff)

  no_border_on_floating = false

  layout=dwindle

  allow_tearing=true
}

dwindle {
  pseudotile = true
  preserve_split = true
  force_split = 2
}

animations {
  enabled = true

  bezier = easeOutQuart, 0.25, 1, 0.5, 1
  bezier = easeOutCirc, 0, 0.55, 0.45, 1
  bezier = easeOutCubic, 0.33, 1, 0.68, 1
  bezier = easeInOutSine, 0.12, 0, 0.39, 0

  animation = windowsIn, 1, 3, easeOutCubic, slide
  animation = windowsOut, 1, 3, easeOutCubic, slide
  animation = windowsMove, 1, 3, easeInOutSine, slide

  animation = fadeIn, 1, 3, easeOutCubic
  animation = fadeOut, 1, 3, easeOutCubic
  animation = fadeSwitch, 1, 5, easeOutCirc
  animation = fadeShadow, 1, 5, easeOutCirc
  animation = fadeDim, 1, 6, easeOutQuart
  animation = workspaces, 1, 3, easeOutQuart, slide
}

misc {
  vfr=1 
  vrr=1 
  
  focus_on_activate=true
  animate_manual_resizes=false
  animate_mouse_windowdragging=false
  enable_swallow=false
  swallow_regex=(kitty)

  disable_hyprland_logo=true
  force_default_wallpaper=false
  new_window_takes_over_fullscreen=2
}
