input {
  kb_layout = us
  numlock_by_default = true
  repeat_delay = 250
  repeat_rate = 35

  touchpad {
    natural_scroll = true
    disable_while_typing = true
    clickfinger_behavior = true 
    scroll_factor = 0.5
  }

  special_fallthrough = true
  follow_mouse = 1
  mouse_refocus = false
}

binds {
  scroll_event_delay = 0
}

gestures {
  workspace_swipe = true
  workspace_swipe_fingers = 3
  workspace_swipe_use_r = true
}
