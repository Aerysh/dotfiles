$text_color = rgba(f4f4f4ff)
$entry_background_color = rgba(6f6f6f11)
$entry_border_color = rgba(be95ff55)
$entry_color = rgba(f4f4f4ff)
$font_family = Noto Sans Light
$font_family_clock = Noto Sans Light
$font_material_symbols = Material Symbols Rounded

background {
  color = rgba(161616ff)
}

input-field {
  monitor =
  size = 250, 50
  outline_thickness = 2
  dots_size = 0.1
  dots_spacing = 0.3
  outer_color = $entry_border_color
  inner_color = $entry_background_color
  font_color = $entry_color

  position = 0, 20
  halign = center
  valign = center
}

label {
  monitor =
  text = $TIME
  shadow_passes = 1
  shadow_boost = 0.5
  color = $text_color
  font_size = 65
  font_family = $font_family_clock

  position = 0, 300
  halign = center
  valign = center
}

label {
  monitor =
  text = hi $USER !!!
  shadow_passes = 1
  shadow_boost = 0.5
  color = $text_color
  font_size = 20
  font_family = $font_family

  position = 0, 240
  halign = center
  valign = center
}

label {
  monitor =
  text = lock
  shadow_passes = 1
  shadow_boost = 0.5
  color = $text_color
  font_size = 21
  font_family = $font_material_symbols

  position = 0, 65
  halign = center
  valign = bottom
}

label {
  monitor =
  text = locked
  shadow_passes = 1
  shadow_boost = 0.5
  color = $text_color
  font_size = 14
  font_family = $font_family

  position = 0, 45
  halign = center
  valign = bottom
}

label {
  monitor =
  text = cmd[update:5000] ~/.config/hypr/scripts/status
  shadow_passes = 1
  shadow_boost = 0.5
  color = $text_color
  font_size = 14
  font_family = $font_family

  position = 30, -30
  halign = left
  valign = top
}
